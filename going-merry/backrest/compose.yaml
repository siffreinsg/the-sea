services:
  backrest:
    image: garethgeorge/backrest:v1.14.1-alpine
    container_name: backrest
    restart: unless-stopped
    ports:
      - "100.64.0.1:9898:9898"     # GM mesh IP — needs tailscaled up; restart policy retries
    environment:
      BACKREST_DATA: /data
      BACKREST_CONFIG: /config/config.json
      XDG_CACHE_HOME: /cache
    volumes:
      - backrest-data:/data
      - backrest-config:/config
      - backrest-cache:/cache
      - ./rclone.conf:/root/.config/rclone/rclone.conf   # rw: protondrive rewrites its own refreshed token in place
      - /home/siffrein/docker-mei:/userdata/docker-mei:ro
      - /var/backups/the-sea:/userdata/backups:ro   # future per-app dumps land here

volumes:
  backrest-data:
  backrest-config:
  backrest-cache:
