services:
  caddy:
    build: .
    container_name: caddy
    network_mode: host          # binds 80/443; backends reached via 127.0.0.1 and mesh DNS
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
