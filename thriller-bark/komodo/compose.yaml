services:
  mongo:
    image: mongo:7
    container_name: komodo-mongo
    labels:
      komodo.skip:
    command: --quiet --wiredTigerCacheSizeGB 0.25
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: komodo
      MONGO_INITDB_ROOT_PASSWORD: ${KOMODO_DB_PASSWORD}
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb

  core:
    image: ghcr.io/moghtech/komodo-core:2
    container_name: komodo-core
    init: true
    network_mode: host # must reach periphery agents over the mesh
    restart: unless-stopped
    depends_on: [mongo]
    env_file: .env
    environment:
      KOMODO_HOST: https://komodo.siffreinsigy.me
      KOMODO_TITLE: The Sea
      KOMODO_DATABASE_ADDRESS: 127.0.0.1:27017
      KOMODO_DATABASE_USERNAME: komodo
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
      KOMODO_PASSKEY: ${KOMODO_PASSKEY}
      KOMODO_JWT_SECRET: ${KOMODO_JWT_SECRET}
      KOMODO_WEBHOOK_SECRET: ${KOMODO_WEBHOOK_SECRET}
      KOMODO_LOCAL_AUTH: "true"
      KOMODO_DISABLE_USER_REGISTRATION: "true"
      KOMODO_DISABLE_CONFIRM_DIALOG: "true"
    volumes:
      - keys:/config/keys # persist Core/Periphery comms keys

volumes:
  mongo-data:
  mongo-config:
  keys:
